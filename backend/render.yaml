services:
  - type: web
    name: smartseason-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn smartseason.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: smartseason.settings_production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com