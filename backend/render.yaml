services:
  - type: web
    name: smartseason-backend
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py setup_demo
      python manage.py collectstatic --noinput
    startCommand: gunicorn smartseason.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: smartseason.settings_production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: POETRY_VERSION
        value: ""  # Empty to disable Poetry
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com